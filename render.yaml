services:
  - type: web
    name: wildfires-india-api
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://wildfires-india.vercel.app
      - key: FIRMS_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /health
    plan: free
