services:
  - type: web
    name: wildfires-india-api
    env: python
    buildCommand: pip install -r backend/requirements.txt && pip install sentence-transformers faiss-cpu xgboost scikit-learn
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: ALLOWED_ORIGINS
        value: https://wildfires-india.vercel.app
      - key: FIRMS_API_KEY
        sync: false
    healthCheckPath: /health
    plan: free
